<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1a1a2e"/>
  <!-- Owl body -->
  <ellipse cx="50" cy="58" rx="28" ry="30" fill="#00d4ff"/>
  <!-- Owl head -->
  <circle cx="50" cy="35" r="22" fill="#00d4ff"/>
  <!-- Left ear -->
  <polygon points="30,20 38,35 28,35" fill="#00d4ff"/>
  <!-- Right ear -->
  <polygon points="70,20 62,35 72,35" fill="#00d4ff"/>
  <!-- Left eye background -->
  <circle cx="40" cy="35" r="10" fill="#1a1a2e"/>
  <!-- Right eye background -->
  <circle cx="60" cy="35" r="10" fill="#1a1a2e"/>
  <!-- Left pupil -->
  <circle cx="40" cy="35" r="5" fill="#ff00ff"/>
  <!-- Right pupil -->
  <circle cx="60" cy="35" r="5" fill="#ff00ff"/>
  <!-- Beak -->
  <polygon points="50,42 45,50 55,50" fill="#ffff00"/>
  <!-- Chest pattern -->
  <ellipse cx="50" cy="65" rx="12" ry="15" fill="#1a1a2e"/>
</svg>
